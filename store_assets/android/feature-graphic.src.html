<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1024px; height:500px; overflow:hidden; background:#03A9F4; }
  .wrap {
    width:1024px; height:500px; background:#03A9F4;
    display:flex; align-items:center; justify-content:center; gap:54px;
    padding:0 80px; font-family:"Segoe UI",system-ui,Arial,sans-serif;
  }
  .art { flex:0 0 auto; }
  .txt { color:#fff; }
  .title { font-size:72px; font-weight:800; letter-spacing:-1px; line-height:1; white-space:nowrap; }
  .sub { font-size:33px; font-weight:500; opacity:.92; margin-top:18px; line-height:1.25; }
  .chips { margin-top:26px; display:flex; gap:12px; white-space:nowrap; }
  .chip { font-size:20px; font-weight:600; color:#03A9F4; background:#fff;
          padding:8px 17px; border-radius:20px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="art">
      <svg width="300" height="300" viewBox="34 34 92 92" xmlns="http://www.w3.org/2000/svg">
        <polyline points="50,64 80,42 110,64" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="56" y="68" width="22" height="22" rx="6" fill="#fff"/>
        <rect x="82" y="68" width="22" height="22" rx="6" fill="#fff"/>
        <rect x="56" y="94" width="22" height="22" rx="6" fill="#fff"/>
        <rect x="82" y="94" width="22" height="22" rx="6" fill="#fff"/>
        <circle cx="67" cy="77.5" r="4.2" fill="#03A9F4"/>
        <rect x="64.5" y="81.5" width="5" height="2.4" rx="1.2" fill="#03A9F4"/>
        <rect x="86" y="75.5" width="14" height="7" rx="3.5" fill="none" stroke="#03A9F4" stroke-width="2"/>
        <circle cx="89.6" cy="79" r="2.4" fill="#03A9F4"/>
        <rect x="61" y="105.5" width="3" height="5.5" rx="1" fill="#03A9F4"/>
        <rect x="65.5" y="102.5" width="3" height="8.5" rx="1" fill="#03A9F4"/>
        <rect x="70" y="99.5" width="3" height="11.5" rx="1" fill="#03A9F4"/>
        <rect x="86" y="101.5" width="14" height="7" rx="3.5" fill="#03A9F4"/>
        <circle cx="96.4" cy="105" r="2.4" fill="#fff"/>
      </svg>
    </div>
    <div class="txt">
      <div class="title">HA Widgets</div>
      <div class="sub">Home Assistant on<br>your home screen</div>
      <div class="chips">
        <span class="chip">Lights</span>
        <span class="chip">Sensors</span>
        <span class="chip">Climate</span>
        <span class="chip">Scenes</span>
      </div>
    </div>
  </div>
</body>
</html>
